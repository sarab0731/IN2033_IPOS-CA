version: '3.8'

services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Password123
      MYSQL_DATABASE: IPOS-CA
      MYSQL_ROOT_HOST: '%'
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pPassword123"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  app:
    build: .
    ports:
      - "6080:6080"   # noVNC web GUI (open in browser)
      - "5900:5900"   # VNC direct access
      - "8082:8082"   # Embedded REST API
    environment:
      DB_URL: jdbc:mysql://mysql:3306/IPOS-CA
      DB_USER: root
      DB_PASSWORD: Password123
      PU_BASE_URL: http://host.docker.internal:8080
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./database:/app/database
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
